# Filebeat Helm Chart Values for PitterPetter
# Logstash와 Kibana와 동일한 SSL 인증서 사용

# Filebeat 보안 설정
daemonSet:
  enabled: true

# 리소스 설정
resources:
  requests:
    cpu: "50m"
    memory: "100Mi"
  limits:
    cpu: "100m"
    memory: "200Mi"

# Filebeat 설정
filebeatConfig:
  filebeat.yml: |
    filebeat.inputs:
    - type: container
      enabled: true
      paths:
        - /var/log/containers/*loventure-prod-*-*_loventure-app_*.log
      processors:
        - add_kubernetes_metadata:
            host: ${NODE_NAME}
            matchers:
            - logs_path:
                logs_path: "/var/log/containers/"
            include_annotations: true
            include_labels: true
        - add_fields:
            fields:
              cluster: "loventure-dev-cluster"
              environment: "development"
              namespace: "monitoring"

    output.logstash:
      hosts: ["logstash-logstash:5044"]
      ssl.enabled: false  # Logstash와 동일하게 SSL 비활성화

    logging.level: info

# 노드 선택자
nodeSelector:
  cloud.google.com/gke-nodepool: pitterpetter-nodes

# Pod 안전성 설정 (Filebeat는 root 권한 필요)
podSecurityContext:
  fsGroup: 0
  runAsUser: 0

securityContext:
  capabilities:
    drop:
    - ALL
    add:
    - CHOWN
    - DAC_OVERRIDE
    - FOWNER
    - FSETID
    - KILL
    - SETGID
    - SETUID
    - SETPCAP
    - NET_BIND_SERVICE
    - NET_RAW
    - SYS_CHROOT
    - SYS_PTRACE
    - SYS_RESOURCE
    - IPC_LOCK
  readOnlyRootFilesystem: false
  runAsNonRoot: false

# 환경 변수
extraEnvs:
  - name: NODE_NAME
    valueFrom:
      fieldRef:
        fieldPath: spec.nodeName

# 볼륨 마운트
extraVolumeMounts:
  - name: varlogcontainers
    mountPath: /var/log/containers
    readOnly: true

# 볼륨
extraVolumes:
  - name: varlogcontainers
    hostPath:
      path: /var/log/containers

# RBAC 설정
rbac:
  create: true

# Secret Mount (SSL 비활성화로 인해 제거됨)