# Kibana 간단 설정 (7.x 버전)
elasticsearchHosts: "http://loventure-elk-master:9200"

# 리소스 설정
resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "1000m"
    memory: "2Gi"

# 복제본 수
replicas: 1

# Kibana 설정 (7.x 버전 - HTTP 모드)
kibanaConfig:
  kibana.yml: |
    server.name: kibana
    server.host: "0.0.0.0"
    server.port: 5601
    elasticsearch.hosts: ["http://loventure-elk-master:9200"]
    elasticsearch.requestTimeout: 30000
    elasticsearch.shardTimeout: 30000
    elasticsearch.pingTimeout: 30000

# 보안 설정 완전 비활성화
secret:
  enabled: false

tls:
  enabled: false

# Elasticsearch 보안 비활성화
elasticsearch:
  security:
    enabled: false

# 서비스 설정
service:
  type: ClusterIP
  ports:
    http: 5601

# 노드 선택자
nodeSelector:
  cloud.google.com/gke-nodepool: pitterpetter-nodes

# Pod 안전성 설정
podSecurityContext:
  fsGroup: 1000
  runAsUser: 1000

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000

# 환경 변수 (7.x 버전)
extraEnvs:
  - name: "NODE_OPTIONS"
    value: "--max-old-space-size=1024"
