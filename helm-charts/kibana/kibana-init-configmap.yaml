apiVersion: v1
kind: ConfigMap
metadata:
  name: kibana-init-config
  namespace: loventure-app
  labels:
    app: kibana
    component: monitoring
data:
  # Index Pattern 설정
  index-patterns.json: |
    {
      "version": "8.0.0",
      "objects": [
        {
          "id": "pitterpetter-logs-*",
          "type": "index-pattern",
          "attributes": {
            "title": "pitterpetter-logs-*",
            "timeFieldName": "@timestamp",
            "fields": "{\"@timestamp\":{\"count\":0,\"name\":\"@timestamp\",\"type\":\"date\",\"esTypes\":[\"date\"],\"scripted\":false,\"searchable\":true,\"aggregatable\":true,\"readFromDocValues\":true},\"level\":{\"count\":0,\"name\":\"level\",\"type\":\"string\",\"esTypes\":[\"keyword\"],\"scripted\":false,\"searchable\":true,\"aggregatable\":true,\"readFromDocValues\":true},\"service\":{\"count\":0,\"name\":\"service\",\"type\":\"string\",\"esTypes\":[\"keyword\"],\"scripted\":false,\"searchable\":true,\"aggregatable\":true,\"readFromDocValues\":true},\"service_type\":{\"count\":0,\"name\":\"service_type\",\"type\":\"string\",\"esTypes\":[\"keyword\"],\"scripted\":false,\"searchable\":true,\"aggregatable\":true,\"readFromDocValues\":true},\"log_message\":{\"count\":0,\"name\":\"log_message\",\"type\":\"string\",\"esTypes\":[\"text\"],\"scripted\":false,\"searchable\":true,\"aggregatable\":false,\"readFromDocValues\":false},\"thread\":{\"count\":0,\"name\":\"thread\",\"type\":\"string\",\"esTypes\":[\"keyword\"],\"scripted\":false,\"searchable\":true,\"aggregatable\":true,\"readFromDocValues\":true},\"logger\":{\"count\":0,\"name\":\"logger\",\"type\":\"string\",\"esTypes\":[\"keyword\"],\"scripted\":false,\"searchable\":true,\"aggregatable\":true,\"readFromDocValues\":true},\"cluster\":{\"count\":0,\"name\":\"cluster\",\"type\":\"string\",\"esTypes\":[\"keyword\"],\"scripted\":false,\"searchable\":true,\"aggregatable\":true,\"readFromDocValues\":true},\"environment\":{\"count\":0,\"name\":\"environment\",\"type\":\"string\",\"esTypes\":[\"keyword\"],\"scripted\":false,\"searchable\":true,\"aggregatable\":true,\"readFromDocValues\":true}}"
          }
        }
      ]
    }

  # 기본 대시보드 설정
  dashboards.json: |
    {
      "version": "8.0.0",
      "objects": [
        {
          "id": "pitterpetter-overview-dashboard",
          "type": "dashboard",
          "attributes": {
            "title": "PitterPetter Application Overview",
            "description": "PitterPetter 애플리케이션 전체 모니터링 대시보드",
            "panelsJSON": "[{\"version\":\"8.0.0\",\"gridData\":{\"x\":0,\"y\":0,\"w\":24,\"h\":15,\"i\":\"1\"},\"panelIndex\":\"1\",\"embeddableConfig\":{},\"panelRefName\":\"panel_1\"},{\"version\":\"8.0.0\",\"gridData\":{\"x\":24,\"y\":0,\"w\":24,\"h\":15,\"i\":\"2\"},\"panelIndex\":\"2\",\"embeddableConfig\":{},\"panelRefName\":\"panel_2\"}]",
            "optionsJSON": "{\"useMargins\":true,\"syncColors\":false,\"hidePanelTitles\":false}",
            "version": 1,
            "timeRestore": false,
            "kibanaSavedObjectMeta": {
              "searchSourceJSON": "{\"query\":{\"query\":\"\",\"language\":\"kuery\"},\"filter\":[]}"
            }
          }
        }
      ]
    }

  # 기본 시각화 설정
  visualizations.json: |
    {
      "version": "8.0.0",
      "objects": [
        {
          "id": "log-level-distribution",
          "type": "visualization",
          "attributes": {
            "title": "Log Level Distribution",
            "visState": "{\"title\":\"Log Level Distribution\",\"type\":\"histogram\",\"params\":{\"grid\":{\"categoryLines\":false,\"style\":{\"color\":\"#eee\"}},\"categoryAxes\":[{\"id\":\"CategoryAxis-1\",\"type\":\"category\",\"position\":\"bottom\",\"show\":true,\"style\":{},\"scale\":{\"type\":\"linear\"},\"labels\":{\"show\":true,\"truncate\":100},\"title\":{}}],\"valueAxes\":[{\"id\":\"ValueAxis-1\",\"name\":\"LeftAxis-1\",\"type\":\"value\",\"position\":\"left\",\"show\":true,\"style\":{},\"scale\":{\"type\":\"linear\",\"mode\":\"normal\"},\"labels\":{\"show\":true,\"rotate\":0,\"filter\":false,\"truncate\":100},\"title\":{\"text\":\"Count\"}}],\"seriesParams\":[{\"show\":true,\"type\":\"histogram\",\"mode\":\"stacked\",\"data\":{\"label\":\"Count\",\"id\":\"1\"},\"valueAxis\":\"ValueAxis-1\",\"drawLinesBetweenPoints\":true,\"showCircles\":true}],\"addTooltip\":true,\"addLegend\":true,\"legendPosition\":\"right\",\"times\":[],\"addTimeMarker\":false},\"aggs\":[{\"id\":\"1\",\"enabled\":true,\"type\":\"count\",\"params\":{},\"schema\":\"metric\"},{\"id\":\"2\",\"enabled\":true,\"type\":\"terms\",\"params\":{\"field\":\"level.keyword\",\"size\":5,\"order\":\"desc\",\"orderBy\":\"1\"},\"schema\":\"segment\"}]}",
            "uiStateJSON": "{}",
            "description": "로그 레벨별 분포를 보여주는 히스토그램",
            "version": 1,
            "kibanaSavedObjectMeta": {
              "searchSourceJSON": "{\"index\":\"pitterpetter-logs-*\",\"query\":{\"query\":\"\",\"language\":\"kuery\"},\"filter\":[]}"
            }
          }
        },
        {
          "id": "service-logs-timeline",
          "type": "visualization",
          "attributes": {
            "title": "Service Logs Timeline",
            "visState": "{\"title\":\"Service Logs Timeline\",\"type\":\"histogram\",\"params\":{\"grid\":{\"categoryLines\":false,\"style\":{\"color\":\"#eee\"}},\"categoryAxes\":[{\"id\":\"CategoryAxis-1\",\"type\":\"category\",\"position\":\"bottom\",\"show\":true,\"style\":{},\"scale\":{\"type\":\"linear\"},\"labels\":{\"show\":true,\"truncate\":100},\"title\":{}}],\"valueAxes\":[{\"id\":\"ValueAxis-1\",\"name\":\"LeftAxis-1\",\"type\":\"value\",\"position\":\"left\",\"show\":true,\"style\":{},\"scale\":{\"type\":\"linear\",\"mode\":\"normal\"},\"labels\":{\"show\":true,\"rotate\":0,\"filter\":false,\"truncate\":100},\"title\":{\"text\":\"Count\"}}],\"seriesParams\":[{\"show\":true,\"type\":\"histogram\",\"mode\":\"stacked\",\"data\":{\"label\":\"Count\",\"id\":\"1\"},\"valueAxis\":\"ValueAxis-1\",\"drawLinesBetweenPoints\":true,\"showCircles\":true}],\"addTooltip\":true,\"addLegend\":true,\"legendPosition\":\"right\",\"times\":[],\"addTimeMarker\":false},\"aggs\":[{\"id\":\"1\",\"enabled\":true,\"type\":\"count\",\"params\":{},\"schema\":\"metric\"},{\"id\":\"2\",\"enabled\":true,\"type\":\"terms\",\"params\":{\"field\":\"service.keyword\",\"size\":10,\"order\":\"desc\",\"orderBy\":\"1\"},\"schema\":\"segment\"},{\"id\":\"3\",\"enabled\":true,\"type\":\"date_histogram\",\"params\":{\"field\":\"@timestamp\",\"interval\":\"auto\",\"customInterval\":\"2h\",\"min_doc_count\":1,\"extended_bounds\":{}},\"schema\":\"segment\"}]}",
            "uiStateJSON": "{}",
            "description": "서비스별 로그 타임라인을 보여주는 히스토그램",
            "version": 1,
            "kibanaSavedObjectMeta": {
              "searchSourceJSON": "{\"index\":\"pitterpetter-logs-*\",\"query\":{\"query\":\"\",\"language\":\"kuery\"},\"filter\":[]}"
            }
          }
        }
      ]
    }

  # 기본 검색 설정
  searches.json: |
    {
      "version": "8.0.0",
      "objects": [
        {
          "id": "error-logs-search",
          "type": "search",
          "attributes": {
            "title": "Error Logs Search",
            "description": "ERROR 레벨 이상의 로그를 검색",
            "hits": 0,
            "columns": ["@timestamp", "level", "service", "log_message"],
            "sort": ["@timestamp", "desc"],
            "version": 1,
            "kibanaSavedObjectMeta": {
              "searchSourceJSON": "{\"index\":\"pitterpetter-logs-*\",\"query\":{\"query\":\"level: (ERROR OR FATAL)\",\"language\":\"kuery\"},\"filter\":[]}"
            }
          }
        },
        {
          "id": "course-service-logs-search",
          "type": "search",
          "attributes": {
            "title": "Course Service Logs",
            "description": "course-service 관련 로그 검색",
            "hits": 0,
            "columns": ["@timestamp", "level", "thread", "logger", "log_message"],
            "sort": ["@timestamp", "desc"],
            "version": 1,
            "kibanaSavedObjectMeta": {
              "searchSourceJSON": "{\"index\":\"pitterpetter-logs-*\",\"query\":{\"query\":\"service: course-service\",\"language\":\"kuery\"},\"filter\":[]}"
            }
          }
        }
      ]
    }
