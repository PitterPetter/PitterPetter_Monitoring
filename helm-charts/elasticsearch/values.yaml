# Elasticsearch Helm Chart Values for PitterPetter
# https://github.com/elastic/helm-charts/tree/main/elasticsearch

# Elasticsearch 설정
clusterName: "loventure-elk"
nodeGroup: "master"

# 버전 고정 (7.x)
image: "docker.elastic.co/elasticsearch/elasticsearch"
imageTag: "7.17.3"

# 단일 노드 클러스터 설정 (원래 설정 유지)

# 리소스 설정 (다중 노드용으로 조정)
resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "1000m"
    memory: "2Gi"

# 스토리지 설정
volumeClaimTemplate:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
  storageClassName: "standard-rwo"

# 복제본 수 (다중 노드 클러스터)
replicas: 2

# 환경 변수 (다중 노드용으로 조정)
extraEnvs:
  - name: "ES_JAVA_OPTS"
    value: "-Xms1g -Xmx1g"

# 보안 설정 (7.x 버전 - 보안 비활성화로 간단한 설정)
esConfig:
  elasticsearch.yml: |
    cluster.name: loventure-elk
    node.name: $${HOSTNAME}
    network.host: 0.0.0.0
    discovery.seed_hosts: ["loventure-elk-master-0.loventure-elk-master-headless", "loventure-elk-master-1.loventure-elk-master-headless"]
    cluster.initial_master_nodes: ["loventure-elk-master-0", "loventure-elk-master-1"]
    xpack.security.enabled: false
    xpack.monitoring.collection.enabled: true
    http.cors.enabled: true
    http.cors.allow-origin: "https://loventure.us, https://api.loventure.us, https://kibana.loventure.us"
    http.cors.allow-headers: "X-Requested-With,X-Auth-Token,Content-Type,Content-Length,Authorization"
    http.cors.allow-credentials: true
    path.data: /usr/share/elasticsearch/data
    path.logs: /usr/share/elasticsearch/logs
    # 다중 노드 클러스터 최적화 설정
    cluster.routing.allocation.disk.threshold_enabled: true
    cluster.routing.allocation.disk.watermark.low: 85%
    cluster.routing.allocation.disk.watermark.high: 90%
    cluster.routing.allocation.disk.watermark.flood_stage: 95%
    # 다중 노드 클러스터 설정 (7.x 버전용)
    # node.master, node.data, node.ingest는 7.x에서 기본값이므로 제거
    # 클러스터 상태 복제 설정
    cluster.routing.allocation.same_shard.host: true

# 서비스 설정
service:
  type: ClusterIP
  ports:
    http: 9200
    transport: 9300

# 헬스체크 설정 (Helm 차트 기본 설정 사용 - 다중 노드 클러스터)

# Pod 안전성 설정
podSecurityContext:
  fsGroup: 1000
  runAsUser: 1000

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000

# 노드 선택자 (GKE 최적화) - 환경별로 변경됨
nodeSelector:
  cloud.google.com/gke-nodepool: ${NODE_POOL_NAME}

# 톨러레이션
tolerations: []

# 어피니티
affinity: {}

# 보안 설정 비활성화 (7.x 버전)
secret:
  enabled: false

tls:
  enabled: false
