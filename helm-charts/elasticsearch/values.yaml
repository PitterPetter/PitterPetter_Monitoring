# Elasticsearch Helm Chart Values for PitterPetter
# https://github.com/elastic/helm-charts/tree/main/elasticsearch

# Elasticsearch 설정
clusterName: "pitterpetter-elk"
nodeGroup: "master"

# 리소스 설정
resources:
  requests:
    cpu: "1000m"
    memory: "2Gi"
  limits:
    cpu: "2000m"
    memory: "4Gi"

# 스토리지 설정
volumeClaimTemplate:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
  storageClassName: "standard-rwo"

# 복제본 수
replicas: 1

# 환경 변수
extraEnvs:
  - name: "ES_JAVA_OPTS"
    value: "-Xms2g -Xmx2g"

# 보안 설정 (개발 환경용)
esConfig:
  elasticsearch.yml: |
    cluster.name: pitterpetter-elk
    node.name: ${HOSTNAME}
    network.host: 0.0.0.0
    discovery.seed_hosts: elasticsearch-master-headless
    cluster.initial_master_nodes: elasticsearch-master-0
    xpack.security.enabled: false
    xpack.monitoring.collection.enabled: true
    http.cors.enabled: true
    http.cors.allow-origin: "*"
    http.cors.allow-headers: "X-Requested-With,X-Auth-Token,Content-Type,Content-Length,Authorization"
    http.cors.allow-credentials: true
    path.data: /usr/share/elasticsearch/data
    path.logs: /usr/share/elasticsearch/logs

# 서비스 설정
service:
  type: ClusterIP
  ports:
    http: 9200
    transport: 9300

# 헬스체크 설정
readinessProbe:
  httpGet:
    path: /_cluster/health?local=true
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /_cluster/health?local=true
    port: http
  initialDelaySeconds: 90
  periodSeconds: 10

# Pod 안전성 설정
podSecurityContext:
  fsGroup: 1000
  runAsUser: 1000

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000

# 노드 선택자 (GKE 최적화)
nodeSelector:
  cloud.google.com/gke-nodepool: default-pool

# 톨러레이션
tolerations: []

# 어피니티
affinity: {}
