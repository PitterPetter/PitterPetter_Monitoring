# Elasticsearch Helm Chart Values for PitterPetter
# https://github.com/elastic/helm-charts/tree/main/elasticsearch

# Elasticsearch 설정
clusterName: "loventure-elk"
nodeGroup: "master"

# 단일 노드 클러스터 설정 (원래 설정 유지)

# 리소스 설정
resources:
  requests:
    cpu: "1000m"
    memory: "2Gi"
  limits:
    cpu: "2000m"
    memory: "4Gi"

# 스토리지 설정
volumeClaimTemplate:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
  storageClassName: "standard-rwo"

# 복제본 수
replicas: 1

# 환경 변수
extraEnvs:
  - name: "ES_JAVA_OPTS"
    value: "-Xms2g -Xmx2g"

# 보안 설정 (프로덕션 환경용)
esConfig:
  elasticsearch.yml: |
    cluster.name: loventure-elk
    node.name: ${HOSTNAME}
    network.host: 0.0.0.0
    discovery.seed_hosts: loventure-elk-master-headless
    cluster.initial_master_nodes: loventure-elk-master-0
    xpack.security.enabled: true
    xpack.security.transport.ssl.enabled: true
    xpack.security.http.ssl.enabled: true
    xpack.security.transport.ssl.verification_mode: certificate
    xpack.security.http.ssl.verification_mode: certificate
    xpack.monitoring.collection.enabled: true
    http.cors.enabled: true
    http.cors.allow-origin: "https://loventure.us, https://api.loventure.us, https://kibana.loventure.us"
    http.cors.allow-headers: "X-Requested-With,X-Auth-Token,Content-Type,Content-Length,Authorization"
    http.cors.allow-credentials: true
    path.data: /usr/share/elasticsearch/data
    path.logs: /usr/share/elasticsearch/logs
    # 단일 노드 클러스터 최적화 설정
    cluster.routing.allocation.disk.threshold_enabled: true
    cluster.routing.allocation.disk.watermark.low: 85%
    cluster.routing.allocation.disk.watermark.high: 90%
    cluster.routing.allocation.disk.watermark.flood_stage: 95%

# 서비스 설정
service:
  type: ClusterIP
  ports:
    http: 9200
    transport: 9300

# 헬스체크 설정 (단일 노드 클러스터용)
readinessProbe:
  exec:
    command:
    - bash
    - -c
    - |
      # Exit if ELASTIC_PASSWORD is unset
      if [ -z "${ELASTIC_PASSWORD}" ]; then
        echo "ELASTIC_PASSWORD variable is missing, exiting"
        exit 1
      fi
      
      # Check if the node is responding
      curl -k -u "elastic:${ELASTIC_PASSWORD}" "https://127.0.0.1:9200/" > /dev/null 2>&1
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 3

livenessProbe:
  exec:
    command:
    - bash
    - -c
    - |
      # Exit if ELASTIC_PASSWORD is unset
      if [ -z "${ELASTIC_PASSWORD}" ]; then
        echo "ELASTIC_PASSWORD variable is missing, exiting"
        exit 1
      fi
      
      # Check if the node is responding
      curl -k -u "elastic:${ELASTIC_PASSWORD}" "https://127.0.0.1:9200/" > /dev/null 2>&1
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 3

# Pod 안전성 설정
podSecurityContext:
  fsGroup: 1000
  runAsUser: 1000

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000

# 노드 선택자 (GKE 최적화)
nodeSelector:
  cloud.google.com/gke-nodepool: pitterpetter-nodes

# 톨러레이션
tolerations: []

# 어피니티
affinity: {}

# 보안 설정 활성화 (Helm 차트 레벨)
secret:
  enabled: true

tls:
  enabled: true
